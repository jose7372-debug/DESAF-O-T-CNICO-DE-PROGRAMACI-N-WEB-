<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafío Técnico: Simuladores Interactivos</title>
    <!-- Vinculación del archivo CSS externo -->
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <div class="container">
        <h1>Plataforma de Simuladores Interactivos</h1>

        <!-- EJERCICIO 1: ENFRIAMIENTO DE NEWTON -->
        <section class="simulator-card">
            <h2>1. Simulador de Transferencia de Calor</h2>
            <form id="formCalor" onsubmit="event.preventDefault(); calcularEnfriamiento();">
                <div class="grid-form">
                    <div class="form-group">
                        <label for="t0">Temp. Inicial (T₀) °C:</label>
                        <input type="number" id="t0" value="120" step="any" required>
                    </div>
                    <div class="form-group">
                        <label for="ts">Temp. Entorno (Tₛ) °C:</label>
                        <input type="number" id="ts" value="38" step="any" required>
                    </div>
                    <div class="form-group">
                        <label for="k">Constante (k):</label>
                        <input type="number" id="k" value="0.45" step="any" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="t">Tiempo (t) en horas:</label>
                        <input type="number" id="t" value="3" step="any" min="0" required>
                    </div>
                </div>
                <button type="submit">Calcular Temperatura Final</button>
            </form>
            <div id="resCalor" class="result-box"></div>
        </section>

        <!-- EJERCICIO 2: COMBINACIONES DEL SORTEO -->
        <section class="simulator-card">
            <h2>2. Calculador de Combinaciones Complejas</h2>
            <form id="formCombinaciones" onsubmit="event.preventDefault(); calcularSorteo();">
                <div class="grid-form">
                    <!-- Grupo 1 -->
                    <div class="form-group">
                        <label for="n1">Grupo 1 - Total (n₁):</label>
                        <input type="number" id="n1" value="59" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="r1">Grupo 1 - Selección (r₁):</label>
                        <input type="number" id="r1" value="5" min="0" required>
                    </div>
                    <!-- Grupo 2 -->
                    <div class="form-group">
                        <label for="n2">Grupo 2 - Total (n₂):</label>
                        <input type="number" id="n2" value="35" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="r2">Grupo 2 - Selección (r₂):</label>
                        <input type="number" id="r2" value="1" min="0" required>
                    </div>
                </div>
                <button type="submit">Calcular Combinaciones Totales</button>
            </form>
            <div id="resCombinaciones" class="result-box"></div>
        </section>
    </div>

    <!-- LÓGICA DE PROGRAMACIÓN (JavaScript) -->
    <script>
        // --- EJERCICIO 1: LÓGICA DE ENFRIAMIENTO ---
        function calcularEnfriamiento() {
            // Captura estricta con document.getElementById
            const t0 = parseFloat(document.getElementById('t0').value);
            const ts = parseFloat(document.getElementById('ts').value);
            const k = parseFloat(document.getElementById('k').value);
            const t = parseFloat(document.getElementById('t').value);
            const rBox = document.getElementById('resCalor');

            // Aplicación de la ecuación de transferencia de calor
            const tFinal = ts + (t0 - ts) * Math.exp(-k * t);
            const resultadoRedondeado = Math.round(tFinal);

            // Renderizado dinámico de la caja de resultados
            rBox.className = "result-box";
            rBox.style.display = "block";
            rBox.innerHTML = `Temperatura Final Calculada: <strong>${resultadoRedondeado} °C</strong>`;
        }

        // --- EJERCICIO 2: LÓGICA DE COMBINACIONES ---
        
        // Función propia obligatoria para el factorial (!) de manera recursiva
        function calcularFactorial(num) {
            if (num === 0 || num === 1) return 1;
            return num * calcularFactorial(num - 1);
        }

        // Ecuación estándar: C(n, r) = n! / (r! * (n - r)!)
        function obtenerCombinacion(n, r) {
            if (r > n) return 0;
            return calcularFactorial(n) / (calcularFactorial(r) * calcularFactorial(n - r));
        }

        function calcularSorteo() {
            // Captura de datos desde el formulario HTML
            const n1 = parseInt(document.getElementById('n1').value);
            const r1 = parseInt(document.getElementById('r1').value);
            const n2 = parseInt(document.getElementById('n2').value);
            const r2 = parseInt(document.getElementById('r2').value);
            const rBox = document.getElementById('resCombinaciones');

            // Validaciones matemáticas de compatibilidad lógica para evitar desbordamientos
            if (r1 > n1 || r2 > n2) {
                rBox.className = "result-box error";
                rBox.style.display = "block";
                rBox.innerHTML = "Error: El número de selecciones (r) no puede superar al total del grupo (n).";
                return;
            }

            // Procesamiento aritmético de ambos grupos
            const combGrupo1 = obtenerCombinacion(n1, r1);
            const combGrupo2 = obtenerCombinacion(n2, r2);
            const combinacionesTotales = combGrupo1 * combGrupo2;

            // Renderizado y formateo visual de la respuesta
            rBox.className = "result-box";
            rBox.style.display = "block";
            rBox.innerHTML = `
                Combinaciones Grupo 1: ${combGrupo1.toLocaleString()}<br>
                Combinaciones Grupo 2: ${combGrupo2.toLocaleString()}<br>
                <strong>Total Combinaciones del Sorteo: ${combinacionesTotales.toLocaleString()}</strong>
            `;
        }
    </script>
</body>
</html>
